<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caçadores News - Portal de Lendas</title>
    <!-- Importando Tailwind para utilitários rápidos e Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen pb-20">

    <!-- Cabeçalho -->
    <header class="p-6 text-center border-b border-red-900 mb-8 bg-black/50">
        <h1 class="horror-font text-5xl md:text-7xl text-red-600 tracking-wider">CAÇADORES NEWS</h1>
        <p class="text-gray-400 mt-2 italic">Onde as lendas se tornam notícias</p>
    </header>

    <main class="max-w-4xl mx-auto px-4">
        <!-- Acesso Administrativo -->
        <div class="flex justify-end mb-6">
            <button id="adminBtn" onclick="toggleAdminPanel()" class="text-sm bg-gray-900 px-4 py-2 rounded border border-red-900 hover:bg-red-900 transition-colors">
                🔐 Painel Admin
            </button>
        </div>

        <!-- Painel de Controle do Admin -->
        <section id="adminPanel" class="hidden mb-12 bg-gray-900/80 p-6 rounded-lg border border-red-800 shadow-2xl backdrop-blur-sm">
            <h2 class="horror-font text-3xl text-red-500 mb-4 text-center">Gerenciamento de Lendas</h2>
            
            <div id="loginForm" class="space-y-4">
                <input type="password" id="adminPass" placeholder="Digite a Senha de Admin" class="w-full p-3 bg-black border border-gray-700 rounded text-white focus:border-red-600 outline-none">
                <button onclick="verifyLogin()" class="btn-horror w-full py-3 rounded font-bold uppercase tracking-widest text-lg">Entrar</button>
            </div>

            <div id="postForm" class="hidden space-y-4">
                <div class="p-2 bg-green-900/20 border border-green-900 text-green-500 text-sm rounded mb-4 text-center font-bold">
                    ACESSO AUTORIZADO - CAÇADOR CHEFE
                </div>
                <input type="text" id="legendTitle" placeholder="Título da Lenda (ex: A Loira do Banheiro)" class="w-full p-2 bg-black border border-gray-700 rounded text-white">
                <input type="text" id="youtubeLink" placeholder="URL do Vídeo do YouTube" class="w-full p-2 bg-black border border-gray-700 rounded text-white">
                <textarea id="legendDesc" rows="3" placeholder="Descrição da lenda e detalhes da investigação..." class="w-full p-2 bg-black border border-gray-700 rounded text-white"></textarea>
                
                <div class="flex gap-2">
                    <button onclick="addLegend()" class="btn-horror flex-1 py-3 rounded font-bold">PUBLICAR AGORA</button>
                    <button onclick="logout()" class="bg-gray-800 px-6 py-3 rounded hover:bg-gray-700 transition-colors font-bold">SAIR</button>
                </div>
            </div>
        </section>

        <!-- Lista de Lendas (Feed) -->
        <div id="feed" class="space-y-8">
            <!-- Gerado via JavaScript -->
        </div>

        <!-- Mensagem de Lista Vazia -->
        <div id="emptyMsg" class="hidden text-center py-20 text-gray-600">
            <div class="text-6xl mb-4">🌑</div>
            <p class="text-xl">Nenhuma lenda catalogada neste setor ainda.</p>
        </div>
    </main>

    <!-- Menu de Ações (Abrir/Copiar) -->
    <div id="overlay" class="overlay" onclick="closeMenu()"></div>
    <div id="actionMenu" class="action-menu text-center">
        <h3 id="menuTitle" class="horror-font text-2xl text-red-500 mb-6 uppercase tracking-widest">OPÇÕES DE INVESTIGAÇÃO</h3>
        <div class="flex flex-col gap-4">
            <button id="btnOpen" class="btn-horror py-4 rounded font-bold text-lg flex items-center justify-center gap-3">
                <span>🎬</span> ABRIR NO YOUTUBE
            </button>
            <button id="btnCopy" class="bg-gray-800 hover:bg-gray-700 py-4 rounded font-bold text-lg flex items-center justify-center gap-3 transition-colors">
                <span>🔗</span> COPIAR LINK
            </button>
            <button onclick="closeMenu()" class="mt-4 text-gray-500 hover:text-white text-sm uppercase font-bold tracking-tighter">Cancelar</button>
        </div>
    </div>

    <!-- Aviso Flutuante (Toast) -->
    <div id="toast" class="toast">
        Mensagem
    </div>

    <footer class="fixed bottom-0 left-0 w-full bg-black/90 border-t border-red-900 p-4 text-center text-xs text-gray-500 z-50">
        &copy; Caçadores News - Site Oficial de Lendas Mirins
    </footer>

    <!-- Script JavaScript -->
    <script src="script.js"></script>
</body>
</html>
